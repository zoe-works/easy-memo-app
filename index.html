<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="スマホ・PCでリアルタイム同期するクラウドメモアプリ">
    <title>CloudMemo — クラウドメモ</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📝</text></svg>">
    <link rel="apple-touch-icon" href="icon.png">
</head>

<body>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
    </div>

    <!-- Toast Notifications -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Delete Confirm Dialog -->
    <div id="deleteDialog" class="dialog-overlay hidden">
        <div class="dialog">
            <h3>メモを削除</h3>
            <p>このメモを削除してもよろしいですか？この操作は取り消せません。</p>
            <div class="dialog-actions">
                <button class="btn-cancel" id="btnCancelDelete">キャンセル</button>
                <button class="btn-confirm-delete" id="btnConfirmDelete">削除する</button>
            </div>
        </div>
    </div>

    <!-- Delete Category Dialog -->
    <div id="deleteCategoryDialog" class="dialog-overlay hidden">
        <div class="dialog">
            <h3>カテゴリを削除</h3>
            <p>このカテゴリを削除しますか？カテゴリに属するメモは「未分類」に移動されます。</p>
            <div class="dialog-actions">
                <button class="btn-cancel" id="btnCancelDeleteCategory">キャンセル</button>
                <button class="btn-confirm-delete" id="btnConfirmDeleteCategory">削除する</button>
            </div>
        </div>
    </div>

    <!-- ========== LOGIN SCREEN ========== -->
    <div id="loginScreen" class="login-screen">
        <div class="login-card">
            <span class="logo-icon">📝</span>
            <div class="logo">CloudMemo</div>
            <p class="subtitle">スマホ・PCでリアルタイム同期するクラウドメモ</p>
            <button id="btnGoogleLogin" class="btn-google">
                <svg viewBox="0 0 24 24">
                    <path fill="#4285F4"
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" />
                    <path fill="#34A853"
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                    <path fill="#FBBC05"
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                    <path fill="#EA4335"
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                </svg>
                Googleアカウントでログイン
            </button>
        </div>
    </div>

    <!-- ========== APP ========== -->
    <div id="appContainer" class="app-container hidden">
        <!-- Sidebar Overlay (mobile) -->
        <div id="sidebarOverlay" class="sidebar-overlay"></div>

        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <span class="app-title">📝 CloudMemo</span>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-section-title">カテゴリ</div>
                <ul id="categoryList" class="category-list">
                    <!-- カテゴリがここに動的に追加される -->
                </ul>

                <form id="addCategoryForm" class="add-category-form">
                    <input type="text" id="newCategoryInput" placeholder="新しいカテゴリ..." maxlength="30">
                    <button type="submit">追加</button>
                </form>
            </div>

            <div class="sidebar-footer">
                <div id="userProfile" class="user-profile">
                    <img id="userAvatar" src="" alt="avatar">
                    <div class="user-info">
                        <div id="userName" class="user-name"></div>
                        <div id="userEmail" class="user-email"></div>
                    </div>
                </div>
                <button id="btnLogout" class="btn-logout">
                    <span>🚪</span>
                    ログアウト
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="main-header">
                <div class="header-left">
                    <button id="btnMenu" class="btn-menu">☰</button>
                    <div class="search-box">
                        <span class="search-icon">🔍</span>
                        <input type="text" id="searchInput" placeholder="メモを検索...">
                    </div>
                </div>
                <button id="btnNewMemo" class="btn-new-memo">
                    <span>＋</span><span class="btn-text"> 新規メモ</span>
                </button>
            </header>

            <!-- Memo Area -->
            <div class="memo-area">
                <!-- Memo List Panel -->
                <div id="memoListPanel" class="memo-list-panel">
                    <div class="memo-list-header">
                        <h2 id="memoListTitle">すべてのメモ</h2>
                        <span id="memoListCount" class="memo-list-count">0</span>
                    </div>
                    <div id="memoList" class="memo-list">
                        <div class="empty-state">
                            <div class="empty-icon">📄</div>
                            <h3>メモがありません</h3>
                            <p>「＋ 新規メモ」ボタンでメモを作成しましょう</p>
                        </div>
                    </div>
                </div>

                <!-- Memo Editor Panel -->
                <div id="memoEditorPanel" class="memo-editor-panel">
                    <div id="editorEmpty" class="empty-state">
                        <div class="empty-icon">✏️</div>
                        <h3>メモを選択</h3>
                        <p>左のリストからメモを選択するか、新しいメモを作成してください</p>
                    </div>

                    <div id="editorContent" class="hidden">
                        <div class="editor-toolbar">
                            <div class="editor-toolbar-left">
                                <button id="btnBackToList" class="btn-back-to-list">← 戻る</button>
                                <select id="editorCategory" class="editor-category-select">
                                    <!-- カテゴリオプションが動的に追加される -->
                                </select>
                                <span id="saveStatus" class="save-status">
                                    <span id="saveStatusText"></span>
                                </span>
                            </div>
                            <div class="editor-actions">
                                <button id="btnDeleteMemo" class="btn-icon danger" title="メモを削除">🗑️</button>
                            </div>
                        </div>
                        <div class="editor-body">
                            <input type="text" id="editorTitle" class="editor-title" placeholder="タイトル">
                            <textarea id="editorTextarea" class="editor-content" placeholder="メモを入力..."></textarea>
                        </div>
                        <div class="editor-footer">
                            <span id="editorMeta"></span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Firebase SDK (CDN) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
</body>

</html>
